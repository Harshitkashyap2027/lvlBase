<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Management – lvlBase</title>
  <link rel="stylesheet" href="../../../core/css/base.css" />
  <link rel="stylesheet" href="../../../core/css/data.css" />
  <style>
    :root {
      --primary: #6C63FF;
      --card-bg: #1A1A2E;
      --dark-bg: #0A0A1A;
      --text-light: #E8E8FF;
      --text-muted: #8892A4;
      --success: #00D1B2;
      --secondary: #FF6B6B;
      --accent: #FFD700;
      --danger: #FF4444;
      --warning: #FFA500;
      --border: rgba(108,99,255,0.18);
      --sidebar-w: 260px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark-bg); color: var(--text-light); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 200; transition: transform .3s; }
    .sidebar-brand { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-brand h2 { font-size: 1.4rem; color: var(--primary); }
    .sidebar-brand span { font-size: .75rem; color: var(--text-muted); }
    .sidebar-user { padding: 16px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .sidebar-user .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .9rem; flex-shrink: 0; }
    .sidebar-user .info .name { font-size: .85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user .info .role { font-size: .72rem; color: var(--success); }
    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 11px 20px; color: var(--text-muted); text-decoration: none; font-size: .88rem; transition: background .2s, color .2s; border-left: 3px solid transparent; }
    .sidebar-nav a:hover { background: rgba(108,99,255,.1); color: var(--text-light); }
    .sidebar-nav a.active { background: rgba(108,99,255,.15); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
    .sidebar-nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .sidebar-bottom { padding: 14px 20px; border-top: 1px solid var(--border); }
    .sidebar-bottom a { display: flex; align-items: center; gap: 10px; color: var(--danger); text-decoration: none; font-size: .88rem; cursor: pointer; }

    /* ── Layout ── */
    .main-wrap { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .navbar { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .navbar-brand { font-size: 1.2rem; font-weight: 700; color: var(--primary); display: none; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; flex-direction: column; gap: 5px; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--text-light); border-radius: 2px; }
    .content { padding: 28px; flex: 1; }
    .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 24px; }

    /* ── Card ── */
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .card-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 18px; }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: .82rem; color: var(--text-muted); font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea {
      background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; color: var(--text-light); font-size: .88rem; outline: none;
      transition: border-color .2s; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-group select option { background: var(--card-bg); }
    .btn { padding: 10px 22px; border-radius: 10px; font-size: .88rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .2s, transform .1s; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-success { background: var(--success); color: #0A0A1A; }
    .btn-success:hover { opacity: .85; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .btn-warning { background: var(--warning); color: #0A0A1A; }
    .btn-sm { padding: 5px 12px; font-size: .78rem; }
    .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
    .btn-outline:hover { background: rgba(108,99,255,.12); }

    /* ── Questions ── */
    .questions-section { margin-top: 20px; }
    .questions-section h4 { font-size: .95rem; color: var(--text-muted); margin-bottom: 12px; }
    .q-form-box { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
    .q-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .q-current-list { margin-top: 14px; }
    .q-item { background: rgba(108,99,255,.07); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
    .q-num { background: var(--primary); color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
    .q-text { flex: 1; font-size: .85rem; line-height: 1.4; }
    .q-opts { font-size: .78rem; color: var(--text-muted); margin-top: 4px; }
    .q-correct { font-size: .78rem; color: var(--success); font-weight: 600; margin-top: 4px; }
    .q-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1rem; padding: 2px; flex-shrink: 0; }

    /* ── Test list ── */
    .test-item { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .test-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .test-title { font-size: .95rem; font-weight: 600; flex: 1; }
    .badge { padding: 3px 10px; border-radius: 10px; font-size: .73rem; font-weight: 700; white-space: nowrap; }
    .badge-subject { background: rgba(108,99,255,.15); color: var(--primary); border: 1px solid var(--border); }
    .badge-dur { background: rgba(255,215,0,.12); color: var(--accent); border: 1px solid rgba(255,215,0,.25); }
    .badge-retake-yes { background: rgba(0,209,178,.12); color: var(--success); border: 1px solid rgba(0,209,178,.25); }
    .badge-retake-no { background: rgba(255,68,68,.12); color: var(--danger); border: 1px solid rgba(255,68,68,.25); }
    .test-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; font-size: .78rem; color: var(--text-muted); }
    .test-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .retake-inline { display: none; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 10px; }
    .retake-inline.open { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .retake-inline label { font-size: .82rem; color: var(--text-muted); }
    .retake-inline select { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--text-light); font-size: .82rem; outline: none; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: .9rem; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; }
    .modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 1rem; }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }
    .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
    .results-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
    .results-table th { text-align: left; padding: 10px 12px; color: var(--text-muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    .results-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.04); }
    .results-table tr:last-child td { border-bottom: none; }
    .score-good { color: var(--success); font-weight: 600; }
    .score-mid { color: var(--warning); font-weight: 600; }
    .score-bad { color: var(--danger); font-weight: 600; }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: .85rem; color: var(--text-light); box-shadow: 0 4px 20px rgba(0,0,0,.4); display: flex; align-items: center; gap: 10px; animation: slideIn .3s ease; min-width: 220px; }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }
    @keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 190; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.visible { display: block; }
      .main-wrap { margin-left: 0; }
      .navbar-brand { display: block; }
      .hamburger { display: flex; }
      .content { padding: 14px; }
      .form-grid { grid-template-columns: 1fr; }
      .q-form-grid { grid-template-columns: 1fr; }
      .test-header { gap: 6px; }
      .modal { max-height: 95vh; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h2>lvlBase ⚡</h2>
    <span>Teacher Portal</span>
  </div>
  <div class="sidebar-user">
    <div class="avatar" id="sidebarAvatar">T</div>
    <div class="info">
      <div class="name" id="sidebarName">Teacher</div>
      <div class="role">Teacher</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="../../../teacher-dashboard.html"><span class="icon">📊</span> Overview</a>
    <a href="teacher-dashboard.html#students"><span class="icon">👥</span> My Students</a>
    <a href="teacher-tasks.html"><span class="icon">📋</span> Assign Tasks</a>
    <a href="teacher-tests.html" class="active"><span class="icon">📝</span> Tests</a>
    <a href="teacher-reports.html"><span class="icon">📈</span> Reports</a>
    <a href="communication.html"><span class="icon">💬</span> Chat</a>
    <a href="../../../settings.html"><span class="icon">⚙️</span> Settings</a>
  </nav>
  <div class="sidebar-bottom">
    <a onclick="logout()"><span class="icon">🚪</span> Logout</a>
  </div>
</aside>

<div class="main-wrap">
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <span class="navbar-brand">lvlBase ⚡</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="background:rgba(108,99,255,.15);color:var(--primary);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.8rem;font-weight:600;">🏫 Teacher</span>
    </div>
  </nav>

  <div class="content">
    <div class="page-title">📝 Test Management</div>

    <!-- Create Test -->
    <div class="card">
      <div class="card-title">➕ Create New Test</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Test Title *</label>
          <input type="text" id="testTitle" placeholder="e.g. Mid-Term Mathematics" />
        </div>
        <div class="form-group">
          <label>Subject *</label>
          <select id="testSubject">
            <option value="">Select subject…</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Science">Science</option>
            <option value="English">English</option>
            <option value="Mixed">Mixed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration (minutes)</label>
          <input type="number" id="testDuration" placeholder="30" min="1" max="300" />
        </div>
        <div class="form-group">
          <label>Allow Retake</label>
          <select id="testRetake">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
      </div>

      <!-- Add Questions -->
      <div class="questions-section">
        <h4>❓ Add Questions</h4>
        <div class="q-form-box">
          <div class="form-group full" style="margin-bottom:10px;">
            <label>Question Text *</label>
            <input type="text" id="qText" placeholder="Enter question…" />
          </div>
          <div class="q-form-grid">
            <div class="form-group">
              <label>Option A *</label>
              <input type="text" id="qA" placeholder="Option A" />
            </div>
            <div class="form-group">
              <label>Option B *</label>
              <input type="text" id="qB" placeholder="Option B" />
            </div>
            <div class="form-group">
              <label>Option C</label>
              <input type="text" id="qC" placeholder="Option C (optional)" />
            </div>
            <div class="form-group">
              <label>Option D</label>
              <input type="text" id="qD" placeholder="Option D (optional)" />
            </div>
            <div class="form-group">
              <label>Correct Answer *</label>
              <select id="qCorrect">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
              </select>
            </div>
          </div>
          <div style="margin-top:12px;">
            <button class="btn btn-outline btn-sm" onclick="addQuestion()">➕ Add Question</button>
          </div>
        </div>

        <!-- Current Questions List -->
        <div class="q-current-list" id="qCurrentList"></div>
        <div id="qCountLabel" style="font-size:.8rem;color:var(--text-muted);margin-top:4px;"></div>
      </div>

      <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-success" onclick="saveTest()">💾 Save Test</button>
        <button class="btn btn-outline btn-sm" onclick="resetTestForm()">🔄 Reset Form</button>
      </div>
    </div>

    <!-- My Tests -->
    <div class="card">
      <div class="card-title">📚 My Tests</div>
      <div id="testList"></div>
    </div>
  </div>
</div>

<!-- Results Modal -->
<div class="modal-overlay" id="resultsModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="resultsModalTitle">Test Results</h3>
      <button class="modal-close" onclick="closeResultsModal()">✕</button>
    </div>
    <div class="modal-body">
      <table class="results-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Student Name</th>
            <th>Score (%)</th>
            <th>Time Taken (min)</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="resultsTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  // ── Auth Guard ──
  (function() {
    const u = JSON.parse(localStorage.getItem('lvlbase_role_user') || 'null');
    if (!u || u.role !== 'teacher') window.location.href = 'portal-login.html';
  })();

  const user = JSON.parse(localStorage.getItem('lvlbase_role_user') || '{}');
  const teacherName = user.name || user.username || 'Teacher';
  document.getElementById('sidebarName').textContent = teacherName;
  document.getElementById('sidebarAvatar').textContent = teacherName.charAt(0).toUpperCase();

  let currentQuestions = [];

  // ── Add question to current build list ──
  function addQuestion() {
    const text = document.getElementById('qText').value.trim();
    const a = document.getElementById('qA').value.trim();
    const b = document.getElementById('qB').value.trim();
    const c = document.getElementById('qC').value.trim();
    const d = document.getElementById('qD').value.trim();
    const correct = document.getElementById('qCorrect').value;
    if (!text || !a || !b) { showToast('Question text, Option A and B are required.', 'error'); return; }
    currentQuestions.push({ text, options: { A: a, B: b, C: c, D: d }, correct });
    ['qText','qA','qB','qC','qD'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('qCorrect').value = 'A';
    renderCurrentQuestions();
  }

  function renderCurrentQuestions() {
    const el = document.getElementById('qCurrentList');
    const label = document.getElementById('qCountLabel');
    label.textContent = `${currentQuestions.length} question${currentQuestions.length !== 1 ? 's' : ''} added`;
    if (!currentQuestions.length) { el.innerHTML = ''; return; }
    el.innerHTML = currentQuestions.map((q, i) => {
      const opts = Object.entries(q.options).filter(([,v]) => v).map(([k,v]) => `${k}: ${v}`).join(' | ');
      return `<div class="q-item">
        <div class="q-num">${i+1}</div>
        <div class="q-text">
          ${q.text}
          <div class="q-opts">${opts}</div>
          <div class="q-correct">✓ Correct: ${q.correct}</div>
        </div>
        <button class="q-del" onclick="removeQuestion(${i})" title="Remove">🗑️</button>
      </div>`;
    }).join('');
  }

  function removeQuestion(idx) {
    currentQuestions.splice(idx, 1);
    renderCurrentQuestions();
  }

  function resetTestForm() {
    document.getElementById('testTitle').value = '';
    document.getElementById('testSubject').value = '';
    document.getElementById('testDuration').value = '';
    document.getElementById('testRetake').value = 'no';
    ['qText','qA','qB','qC','qD'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('qCorrect').value = 'A';
    currentQuestions = [];
    renderCurrentQuestions();
  }

  function saveTest() {
    const title = document.getElementById('testTitle').value.trim();
    const subject = document.getElementById('testSubject').value;
    const duration = parseInt(document.getElementById('testDuration').value) || 30;
    const allowRetake = document.getElementById('testRetake').value;
    if (!title) { showToast('Test title is required.', 'error'); return; }
    if (!subject) { showToast('Please select a subject.', 'error'); return; }
    if (currentQuestions.length === 0) { showToast('Add at least one question.', 'error'); return; }
    const tests = getTests();
    tests.unshift({ id: Date.now(), title, subject, duration, allowRetake, questions: [...currentQuestions], createdAt: new Date().toISOString().split('T')[0], results: [] });
    saveTests(tests);
    resetTestForm();
    renderTests();
    showToast('Test saved successfully! 📝');
  }

  // ── Storage ──
  function getTests() { return JSON.parse(localStorage.getItem('lvlbase_teacher_tests') || '[]'); }
  function saveTests(arr) { localStorage.setItem('lvlbase_teacher_tests', JSON.stringify(arr)); }

  // ── Render tests list ──
  function renderTests() {
    const tests = getTests();
    const list = document.getElementById('testList');
    if (!tests.length) { list.innerHTML = '<div class="empty-state">No tests created yet. Create your first test above! 📝</div>'; return; }

    list.innerHTML = tests.map(test => {
      const results = JSON.parse(localStorage.getItem('lvlbase_test_results') || '[]').filter(r => r.testId === test.id);
      const attempts = results.length;
      const retakeCls = test.allowRetake === 'yes' ? 'badge-retake-yes' : 'badge-retake-no';
      return `
        <div class="test-item" id="test-item-${test.id}">
          <div class="test-header">
            <span class="test-title">${test.title}</span>
            <span class="badge badge-subject">${test.subject}</span>
            <span class="badge badge-dur">⏱ ${test.duration} min</span>
            <span class="badge ${retakeCls}" id="retake-badge-${test.id}">Retake: ${test.allowRetake === 'yes' ? '✅ Yes' : '❌ No'}</span>
          </div>
          <div class="test-meta">
            <span>❓ ${test.questions.length} question${test.questions.length !== 1 ? 's' : ''}</span>
            <span>👤 ${attempts} attempt${attempts !== 1 ? 's' : ''}</span>
            <span>📅 Created: ${test.createdAt}</span>
          </div>
          <div class="test-actions">
            <button class="btn btn-outline btn-sm" onclick="viewResults(${test.id})">👁️ View Results</button>
            <button class="btn btn-warning btn-sm" onclick="toggleRetakeEdit(${test.id})">✏️ Edit Retake</button>
            <button class="btn btn-danger btn-sm" onclick="deleteTest(${test.id})">🗑️ Delete</button>
          </div>
          <div class="retake-inline" id="retake-edit-${test.id}">
            <label>Allow Retake:</label>
            <select id="retake-sel-${test.id}">
              <option value="no" ${test.allowRetake !== 'yes' ? 'selected' : ''}>No</option>
              <option value="yes" ${test.allowRetake === 'yes' ? 'selected' : ''}>Yes</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="saveRetake(${test.id})">Save</button>
            <button class="btn btn-sm" style="background:rgba(255,255,255,.08);color:var(--text-muted);" onclick="toggleRetakeEdit(${test.id})">Cancel</button>
          </div>
        </div>`;
    }).join('');
  }

  function toggleRetakeEdit(id) {
    const el = document.getElementById(`retake-edit-${id}`);
    if (el) el.classList.toggle('open');
  }

  function saveRetake(id) {
    const val = document.getElementById(`retake-sel-${id}`).value;
    const tests = getTests();
    const idx = tests.findIndex(t => t.id === id);
    if (idx !== -1) { tests[idx].allowRetake = val; saveTests(tests); }
    document.getElementById(`retake-badge-${id}`).textContent = `Retake: ${val === 'yes' ? '✅ Yes' : '❌ No'}`;
    toggleRetakeEdit(id);
    showToast('Retake setting updated.');
  }

  function deleteTest(id) {
    if (!confirm('Delete this test and all its data?')) return;
    saveTests(getTests().filter(t => t.id !== id));
    renderTests();
    showToast('Test deleted.', 'error');
  }

  // ── View Results ──
  const MOCK_RESULTS = [
    { studentName: 'Alex Johnson', score: 95, timeTaken: 24, date: '2025-01-20' },
    { studentName: 'Maya Patel',   score: 88, timeTaken: 28, date: '2025-01-20' },
    { studentName: 'Nina Walsh',   score: 97, timeTaken: 20, date: '2025-01-21' },
    { studentName: 'Sara Kim',     score: 74, timeTaken: 30, date: '2025-01-21' },
    { studentName: 'Chris Lee',    score: 62, timeTaken: 29, date: '2025-01-22' },
    { studentName: 'Tom Rivera',   score: 45, timeTaken: 31, date: '2025-01-22' }
  ];

  function viewResults(id) {
    const tests = getTests();
    const test = tests.find(t => t.id === id);
    if (!test) return;
    document.getElementById('resultsModalTitle').textContent = `Results: ${test.title}`;
    const realResults = JSON.parse(localStorage.getItem('lvlbase_test_results') || '[]').filter(r => r.testId === id);
    const rows = realResults.length ? realResults : MOCK_RESULTS;
    const tbody = document.getElementById('resultsTableBody');
    tbody.innerHTML = rows.map((r, i) => {
      const sc = r.score >= 80 ? 'score-good' : r.score >= 60 ? 'score-mid' : 'score-bad';
      return `<tr>
        <td>${i+1}</td>
        <td>${r.studentName || r.student || 'Student'}</td>
        <td class="${sc}">${r.score}%</td>
        <td>${r.timeTaken || r.time || '—'}</td>
        <td>${r.date || '—'}</td>
      </tr>`;
    }).join('');
    document.getElementById('resultsModal').classList.add('open');
  }

  function closeResultsModal() {
    document.getElementById('resultsModal').classList.remove('open');
  }
  document.getElementById('resultsModal').addEventListener('click', function(e) {
    if (e.target === this) closeResultsModal();
  });

  // ── Sidebar ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('visible');
  }
  function logout() {
    localStorage.removeItem('lvlbase_role_user');
    window.location.href = 'portal-login.html';
  }
  function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span>${msg}`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  renderTests();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log – Admin – lvlBase ⚡</title>
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin-bento.css">
  <script>
    (function() {
      var u = JSON.parse(localStorage.getItem('lvlbase_current_user') || 'null');
      var d = JSON.parse(localStorage.getItem('lvlbase_admin_session') || 'null');
      if (!(u && u.role === 'admin') && !(d && d.loggedIn && Date.now() - d.loginTime < 28800000)) {
        window.location.replace('login.html');
      }
    })();
  </script>
</head>
<body>
  <div id="page-loader" style="position:fixed;inset:0;background:#0A0A14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1rem;transition:opacity 0.3s ease">
    <div style="font-size:2.5rem">⚡</div>
    <div style="color:#6C63FF;font-weight:700;font-size:0.95rem;letter-spacing:0.05em">lvlBase Admin</div>
    <div class="admin-loader-bar"></div>
  </div>

  <div id="sa-sidebar-root"></div>

  <main class="sa-main" id="sa-main" style="opacity:0;transition:opacity 0.25s ease">
    <div class="sa-topbar">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <button id="hamburger-btn" onclick="document.getElementById('sa-sidebar').classList.toggle('open')" style="background:none;border:none;cursor:pointer;color:#F5F5FF;font-size:1.2rem;display:none">&#x2630;</button>
        <div class="sa-topbar-title">Audit Log</div>
      </div>
      <div class="sa-topbar-actions">
        <span id="admin-clock" style="font-size:0.78rem;color:#8892A4"></span>
        <span style="font-size:0.82rem;color:#8892A4">Welcome, <strong style="color:#F5F5FF">Super Admin</strong></span>
        <a href="../index.html" style="padding:0.4rem 0.9rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#F5F5FF;font-size:0.8rem;text-decoration:none">View Site</a>
      </div>
    </div>
    <div class="sa-content">
      <div class="section-heading">Audit Log</div>
      <p class="section-sub">Full record of all admin actions on this platform</p>
      <div class="sa-table-wrap">
        <div class="sa-table-head">
          <div class="sa-table-head-title">Action History</div>
          <div class="sa-table-head-actions">
            <input type="text" class="sa-input" style="width:200px" placeholder="Filter actions…" oninput="filterAudit(this.value)">
            <button class="ab ab-reject" onclick="clearAuditLog()">Clear Log</button>
          </div>
        </div>
        <div class="ov-auto" style="max-height:70vh;overflow-y:auto">
          <table class="sa-table"><thead><tr><th>Time</th><th>Action</th><th>Details</th><th>Source</th></tr></thead><tbody id="audit-tbody"></tbody></table>
        </div>
      </div>
  
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>
  <script src="../js/popup.js"></script>
  <script src="shared.js"></script>
  <script>

    function initPage(){renderAuditTable('');}
    function filterAudit(q){renderAuditTable(q);}
    function renderAuditTable(filter){var log=JSON.parse(localStorage.getItem('lvlbase_audit_log')||'[]').slice().reverse();if(filter)log=log.filter(function(l){return (l.action+l.detail).toLowerCase().includes(filter.toLowerCase());});var tbody=document.getElementById('audit-tbody');if(!log.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:#8892A4;padding:1.5rem">No actions logged yet.</td></tr>';return;}tbody.innerHTML=log.map(function(l){return '<tr><td style="font-size:0.75rem;color:#8892A4;white-space:nowrap">'+new Date(l.ts).toLocaleString('en-IN')+'</td><td style="font-weight:700;font-size:0.83rem">'+esc(l.action)+'</td><td style="font-size:0.82rem;color:#8892A4">'+esc(l.detail)+'</td><td style="font-size:0.75rem;color:#8892A4">'+esc(l.ip||'-')+'</td></tr>';}).join('');}
    function clearAuditLog(){lvlPopup.confirm('Clear Log','Delete all audit history?',{confirmLabel:'Clear',confirmStyle:'danger'}).then(function(c){if(!c)return;localStorage.removeItem('lvlbase_audit_log');renderAuditTable('');});}
  
    document.addEventListener('DOMContentLoaded', function() {
      initAdminPage('audit');
      if (typeof initPage === 'function') initPage();
    });
  </script>
</body>
</html>

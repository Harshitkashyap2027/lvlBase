<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events – Admin – lvlBase ⚡</title>
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin-bento.css">
  <script>
    (function() {
      var u = JSON.parse(localStorage.getItem('lvlbase_current_user') || 'null');
      var d = JSON.parse(localStorage.getItem('lvlbase_admin_session') || 'null');
      if (!(u && u.role === 'admin') && !(d && d.loggedIn && Date.now() - d.loginTime < 28800000)) {
        window.location.replace('login.html');
      }
    })();
  </script>
</head>
<body>

  <div id="sa-sidebar-root"></div>

  <main class="sa-main" id="sa-main">
    <div class="sa-topbar">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <button id="hamburger-btn" onclick="document.getElementById('sa-sidebar').classList.toggle('open')" style="background:none;border:none;cursor:pointer;color:#F5F5FF;font-size:1.2rem;display:none">&#x2630;</button>
        <div class="sa-topbar-title">Events & Challenges</div>
      </div>
      <div class="sa-topbar-actions">
        <span id="admin-clock" style="font-size:0.78rem;color:#8892A4"></span>
        <span style="font-size:0.82rem;color:#8892A4">Welcome, <strong style="color:#F5F5FF">Super Admin</strong></span>
        <a href="../index.html" style="padding:0.4rem 0.9rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#F5F5FF;font-size:0.8rem;text-decoration:none">View Site</a>
      </div>
    </div>
    <div class="sa-content">
      <div class="section-heading">Events &amp; Challenges</div>
      <p class="section-sub">Create and manage global XP events for all students</p>
      <div class="grid-2 mb-3">
        <div class="bc">
          <div style="font-weight:700;margin-bottom:1rem">Create Event</div>
          <div class="sa-group"><label class="sa-label">Title</label><input type="text" id="evt-title" class="sa-input" placeholder="Weekend XP Blitz"></div>
          <div class="sa-group"><label class="sa-label">Description</label><input type="text" id="evt-desc" class="sa-input" placeholder="All students earn 2x XP this weekend!"></div>
          <div class="grid-2">
            <div class="sa-group"><label class="sa-label">XP Bonus</label><select id="evt-bonus" class="sa-input sa-select"><option value="1.5">1.5x</option><option value="2">2x</option><option value="3">3x</option><option value="5">5x EPIC</option></select></div>
            <div class="sa-group"><label class="sa-label">Duration</label><select id="evt-duration" class="sa-input sa-select"><option>1 Day</option><option>3 Days</option><option>1 Week</option><option>1 Month</option></select></div>
          </div>
          <button onclick="createEvent()" style="width:100%;padding:0.75rem;border:none;border-radius:12px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#6C63FF,#BF5AF2);color:white;font-family:inherit">🚀 Launch Event</button>
        </div>
        <div class="bc">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
            <div style="font-weight:700">Active Events</div>
            <button class="ab ab-reject" onclick="clearEvents()">Clear All</button>
          </div>
          <div id="events-list" style="max-height:340px;overflow-y:auto"><div style="color:#8892A4;font-size:0.82rem">No active events.</div></div>
        </div>
      </div>
  
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>
  <script src="../js/popup.js"></script>
  <script src="shared.js"></script>
  <script>

    function initPage(){renderEvents();}
    function createEvent(){var title=document.getElementById('evt-title').value.trim(),desc=document.getElementById('evt-desc').value.trim(),bonus=document.getElementById('evt-bonus').value,dur=document.getElementById('evt-duration').value;if(!title){lvlPopup.toast('Enter event title','error');return;}var evts=JSON.parse(localStorage.getItem('lvlbase_events')||'[]');evts.push({id:'evt_'+Date.now(),title:title,description:desc,xpBonus:bonus,duration:dur,active:true,createdAt:new Date().toISOString()});localStorage.setItem('lvlbase_events',JSON.stringify(evts));document.getElementById('evt-title').value='';document.getElementById('evt-desc').value='';lvlPopup.toast('Event "'+title+'" launched!','success');auditLog('Event created','"'+title+'" '+bonus+'x XP');renderEvents();}
    function renderEvents(){var evts=JSON.parse(localStorage.getItem('lvlbase_events')||'[]'),list=document.getElementById('events-list');if(!evts.length){list.innerHTML='<div style="color:#8892A4;font-size:0.82rem">No active events.</div>';return;}list.innerHTML=evts.slice().reverse().map(function(e){return '<div style="background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.15);border-radius:14px;padding:0.85rem;margin-bottom:0.6rem"><div style="display:flex;justify-content:space-between;margin-bottom:0.4rem"><div style="font-weight:700;font-size:0.85rem">'+esc(e.title)+'</div><span class="badge badge-yellow">'+esc(String(e.xpBonus))+'x XP</span></div><div style="font-size:0.78rem;color:#8892A4">'+esc(e.description)+'</div><div style="display:flex;justify-content:space-between;margin-top:0.5rem"><span style="font-size:0.72rem;color:#8892A4">'+esc(e.duration||'')+'</span><button class="ab ab-reject" onclick="deleteEvent(''+esc(e.id)+'')">Remove</button></div></div>';}).join('');}
    function deleteEvent(id){var e=JSON.parse(localStorage.getItem('lvlbase_events')||'[]').filter(function(x){return x.id!==id;});localStorage.setItem('lvlbase_events',JSON.stringify(e));renderEvents();}
    function clearEvents(){lvlPopup.confirm('Clear Events','Remove all events?',{confirmLabel:'Clear',confirmStyle:'danger'}).then(function(c){if(!c)return;localStorage.removeItem('lvlbase_events');renderEvents();});}
  
    document.addEventListener('DOMContentLoaded', function() {
      initAdminPage('events');
      if (typeof initPage === 'function') initPage();
    });
  </script>
</body>
</html>

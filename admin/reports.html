<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports – Admin – lvlBase ⚡</title>
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin-bento.css">
  <script>
    (function() {
      var u = JSON.parse(localStorage.getItem('lvlbase_current_user') || 'null');
      var d = JSON.parse(localStorage.getItem('lvlbase_admin_session') || 'null');
      if (!(u && u.role === 'admin') && !(d && d.loggedIn && Date.now() - d.loginTime < 28800000)) {
        window.location.replace('login.html');
      }
    })();
  </script>
</head>
<body>
  <div id="page-loader" style="position:fixed;inset:0;background:#0A0A14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1rem;transition:opacity 0.3s ease">
    <div style="font-size:2.5rem">⚡</div>
    <div style="color:#6C63FF;font-weight:700;font-size:0.95rem;letter-spacing:0.05em">lvlBase Admin</div>
    <div class="admin-loader-bar"></div>
  </div>

  <div id="sa-sidebar-root"></div>

  <main class="sa-main" id="sa-main" style="opacity:0;transition:opacity 0.25s ease">
    <div class="sa-topbar">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <button id="hamburger-btn" onclick="document.getElementById('sa-sidebar').classList.toggle('open')" style="background:none;border:none;cursor:pointer;color:#F5F5FF;font-size:1.2rem;display:none">&#x2630;</button>
        <div class="sa-topbar-title">Reports & Exports</div>
      </div>
      <div class="sa-topbar-actions">
        <span id="admin-clock" style="font-size:0.78rem;color:#8892A4"></span>
        <span style="font-size:0.82rem;color:#8892A4">Welcome, <strong style="color:#F5F5FF">Super Admin</strong></span>
        <a href="../index.html" style="padding:0.4rem 0.9rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#F5F5FF;font-size:0.8rem;text-decoration:none">View Site</a>
      </div>
    </div>
    <div class="sa-content">
      <div class="section-heading">Reports &amp; Exports</div>
      <p class="section-sub">Generate and download platform data reports in JSON or CSV format</p>
      <div class="grid-2 mb-3">
        <div class="bc">
          <div style="font-weight:700;margin-bottom:1rem">Generate Report</div>
          <div class="sa-group"><label class="sa-label">Report Type</label>
            <select class="sa-input sa-select" id="report-type">
              <option value="all_users">All Users</option><option value="students">Students Only</option>
              <option value="teachers">Teachers Only</option><option value="parents">Parents Only</option>
              <option value="schools">Schools</option><option value="quiz_history">Quiz History</option>
              <option value="events">Events</option><option value="announcements">Announcements</option>
            </select>
          </div>
          <div class="sa-group"><label class="sa-label">File Format</label>
            <select class="sa-input sa-select" id="report-format"><option value="csv">CSV</option><option value="json">JSON</option></select>
          </div>
          <button onclick="generateReport()" style="width:100%;padding:0.75rem;border:none;border-radius:12px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#6C63FF,#BF5AF2);color:white;font-family:inherit">&#x1F4E5; Download Report</button>
        </div>
        <div class="bc">
          <div style="font-weight:700;margin-bottom:1rem">Platform Summary</div>
          <div id="report-summary"></div>
        </div>
      </div>
  
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>
  <script src="../js/popup.js"></script>
  <script src="shared.js"></script>
  <script>

    function initPage(){renderReportSummary();}
    function renderReportSummary(){var users=getAllUsers(),schools=getAllSchools(),quizH=getQuizHistory();var students=users.filter(function(u){return u.role==='student';});var teachers=users.filter(function(u){return u.role==='teacher';});var parents=users.filter(function(u){return u.role==='parent';});var el=document.getElementById('report-summary');if(!el)return;el.innerHTML=[['&#x1F393; Students',students.length],['&#x1F468;&#x200D;&#x1F3EB; Teachers',teachers.length],['&#x1F468;&#x200D;&#x1F469;&#x200D;&#x1F467; Parents',parents.length],['&#x1F3EB; Schools',schools.length],['&#x1F3AF; Quiz Records',quizH.length],['&#x1F4E2; Announcements',JSON.parse(localStorage.getItem('lvlbase_announcements')||'[]').length],['&#x1F389; Events',JSON.parse(localStorage.getItem('lvlbase_events')||'[]').length]].map(function(x){return '<div style="display:flex;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid rgba(255,255,255,0.06)"><span style="color:#8892A4">'+x[0]+'</span><span style="font-weight:700;color:#F5F5FF">'+x[1]+'</span></div>';}).join('');}
    function generateReport(){var type=document.getElementById('report-type').value,format=document.getElementById('report-format').value;var users=getAllUsers(),schools=getAllSchools(),quizH=getQuizHistory();var data,filename;if(type==='all_users'){data=users;filename='users';}else if(type==='students'){data=users.filter(function(u){return u.role==='student';});filename='students';}else if(type==='teachers'){data=users.filter(function(u){return u.role==='teacher';});filename='teachers';}else if(type==='parents'){data=users.filter(function(u){return u.role==='parent';});filename='parents';}else if(type==='schools'){data=schools;filename='schools';}else if(type==='quiz_history'){data=quizH;filename='quiz-history';}else if(type==='events'){data=JSON.parse(localStorage.getItem('lvlbase_events')||'[]');filename='events';}else{data=JSON.parse(localStorage.getItem('lvlbase_announcements')||'[]');filename='announcements';}if(!Array.isArray(data)||!data.length){lvlPopup.toast('No data to export','warning');return;}var dateStr=new Date().toISOString().slice(0,10);if(format==='csv'){var keySet={};data.forEach(function(r){Object.keys(r).forEach(function(k){keySet[k]=true;});});var keys=Object.keys(keySet);var csv=keys.join(',')+'\n'+data.map(function(r){return keys.map(function(k){var v=r[k];if(v===null||v===undefined)return'';return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lvlbase-'+filename+'-'+dateStr+'.csv';a.click();}else{var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lvlbase-'+filename+'-'+dateStr+'.json';a.click();}lvlPopup.toast('Report downloaded!','success');auditLog('Report downloaded',type+' as '+format);}
  
    document.addEventListener('DOMContentLoaded', function() {
      initAdminPage('reports');
      if (typeof initPage === 'function') initPage();
    });
  </script>
</body>
</html>

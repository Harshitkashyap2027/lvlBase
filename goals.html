<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals – lvlBase ⚡</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .goal-item-full { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 0.75rem; transition: var(--transition); }
    .goal-item-full:hover { border-color: var(--primary); }
    .goal-item-full.completed-goal { opacity: 0.7; border-left: 4px solid var(--success); }
    .goal-item-full.overdue-goal { border-left: 4px solid var(--danger); }
    .goal-top { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.75rem; }
    .goal-cat-icon { width: 40px; height: 40px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .goal-main { flex: 1; }
    .goal-title-text { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.3rem; }
    .goal-meta { display: flex; gap: 0.5rem; font-size: 0.8rem; color: var(--text-muted); flex-wrap: wrap; align-items: center; }
    .goal-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .goal-xp-badge { background: rgba(255,215,0,0.2); color: var(--accent); padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .template-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 0.9rem; cursor: pointer; transition: var(--transition); }
    .template-card:hover { border-color: var(--primary); background: rgba(108,99,255,0.08); }
    .modal-overlay { display: none; }
    .modal-overlay.active { display: flex; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">lvlBase ⚡</a>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="subjects.html" class="nav-link">Study</a>
      <a href="quiz.html" class="nav-link">Quiz</a>
      <a href="goals.html" class="nav-link active">Goals</a>
    </div>
    <div class="navbar-actions">
      <a href="dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
      <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ New Goal</button>
    </div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <div class="page-wrapper">
    <div style="max-width:900px;margin:0 auto;padding:2rem 1.5rem">
      <div class="page-header">
        <h1 class="page-title">🎯 Goals</h1>
        <p class="page-subtitle">Set targets, track progress, earn XP</p>
      </div>

      <!-- Stats -->
      <div class="grid grid-4 mb-4">
        <div class="stat-card" style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:var(--radius-lg)">
          <div class="stat-value" id="active-count" style="color:var(--primary)">0</div>
          <div class="stat-label">Active Goals</div>
        </div>
        <div class="stat-card" style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:var(--radius-lg)">
          <div class="stat-value" id="completed-count" style="color:var(--success)">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card" style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:var(--radius-lg)">
          <div class="stat-value" id="xp-from-goals" style="color:var(--accent)">0</div>
          <div class="stat-label">XP from Goals</div>
        </div>
        <div class="stat-card" style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:var(--radius-lg)">
          <div class="stat-value" id="streak-days" style="color:var(--secondary)">0</div>
          <div class="stat-label">Day Streak</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs mb-3">
        <button class="tab-btn active" onclick="switchTab('active',this)">🎯 Active</button>
        <button class="tab-btn" onclick="switchTab('completed',this)">✅ Completed</button>
        <button class="tab-btn" onclick="switchTab('templates',this)">📋 Templates</button>
      </div>

      <!-- Goals List -->
      <div id="goals-container"></div>
    </div>
  </div>

  <!-- Create Goal Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <h2 class="modal-title">🎯 Create New Goal</h2>
        <button class="modal-close" onclick="hideCreateModal()">×</button>
      </div>
      <div class="form-group">
        <label class="form-label">Goal Title *</label>
        <input type="text" id="goal-title" class="form-control" placeholder="e.g., Complete 10 Math quizzes">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="goal-category" class="form-control">
            <option value="study">📚 Study</option>
            <option value="quiz" selected>🎯 Quiz</option>
            <option value="battle">⚔️ Battle</option>
            <option value="streak">🔥 Streak</option>
            <option value="xp">⚡ XP</option>
            <option value="reading">📖 Reading</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Target Number *</label>
          <input type="number" id="goal-target" class="form-control" placeholder="e.g., 10" min="1">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label class="form-label">Unit (optional)</label>
          <input type="text" id="goal-unit" class="form-control" placeholder="e.g., quizzes">
        </div>
        <div class="form-group">
          <label class="form-label">Deadline</label>
          <input type="date" id="goal-deadline" class="form-control">
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="createGoal()">🎯 Create Goal</button>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    const CATEGORIES = {
      study: { label: 'Study', emoji: '📚', color: '#6C63FF' },
      quiz: { label: 'Quiz', emoji: '🎯', color: '#00D1B2' },
      battle: { label: 'Battle', emoji: '⚔️', color: '#FF6B6B' },
      streak: { label: 'Streak', emoji: '🔥', color: '#FFA500' },
      xp: { label: 'XP', emoji: '⚡', color: '#FFD700' },
      reading: { label: 'Reading', emoji: '📖', color: '#10B981' }
    };

    const TEMPLATES = [
      { title: 'Complete 5 quizzes this week', category: 'quiz', target: 5, unit: 'quizzes', days: 7 },
      { title: 'Maintain a 7-day streak', category: 'streak', target: 7, unit: 'days', days: 7 },
      { title: 'Earn 500 XP this week', category: 'xp', target: 500, unit: 'XP', days: 7 },
      { title: 'Win 3 battles', category: 'battle', target: 3, unit: 'battles', days: 7 },
      { title: 'Study Math for 30 mins daily', category: 'study', target: 30, unit: 'min/day', days: 1 },
      { title: 'Read 1 chapter per day', category: 'reading', target: 1, unit: 'chapters', days: 1 },
      { title: 'Score 80%+ on 3 quizzes', category: 'quiz', target: 3, unit: 'high scores', days: 7 },
      { title: 'Complete 10 quiz sessions', category: 'quiz', target: 10, unit: 'quizzes', days: 14 }
    ];

    let goals = JSON.parse(localStorage.getItem('lvlbase_goals') || '[]');
    let currentTab = 'active';

    const profile = JSON.parse(localStorage.getItem('lvlbase_user_profile') || '{}');

    function getDeadline(days) {
      const d = new Date(); d.setDate(d.getDate() + days);
      return d.toISOString().split('T')[0];
    }

    function getDaysLeft(deadline) {
      return Math.ceil((new Date(deadline) - new Date()) / 86400000);
    }

    function renderStats() {
      const active = goals.filter(g => !g.completed);
      const done = goals.filter(g => g.completed);
      const xp = done.reduce((s, g) => s + (g.xpReward || 100), 0);
      document.getElementById('active-count').textContent = active.length;
      document.getElementById('completed-count').textContent = done.length;
      document.getElementById('xp-from-goals').textContent = xp;
      document.getElementById('streak-days').textContent = profile.streak || 0;
    }

    function renderGoals() {
      const container = document.getElementById('goals-container');
      if (currentTab === 'templates') { renderTemplates(); return; }
      const filtered = currentTab === 'active' ? goals.filter(g => !g.completed) : goals.filter(g => g.completed);

      if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text-muted)">
          <div style="font-size:3rem;margin-bottom:1rem">${currentTab === 'active' ? '🎯' : '✅'}</div>
          <div style="font-size:1.1rem;font-weight:600;margin-bottom:0.5rem">${currentTab === 'active' ? 'No active goals' : 'No completed goals yet'}</div>
          <div style="font-size:0.85rem;margin-bottom:1.5rem">${currentTab === 'active' ? 'Set a goal to start earning bonus XP!' : 'Complete your goals to see them here!'}</div>
          ${currentTab === 'active' ? '<button class="btn btn-primary" onclick="showCreateModal()">+ Create First Goal</button>' : ''}
        </div>`;
        return;
      }

      container.innerHTML = filtered.map(goal => {
        const cat = CATEGORIES[goal.category] || CATEGORIES.study;
        const pct = Math.min(100, Math.round((goal.current || 0) / goal.target * 100));
        const daysLeft = getDaysLeft(goal.deadline);
        const isOverdue = daysLeft < 0 && !goal.completed;
        return `<div class="goal-item-full ${goal.completed ? 'completed-goal' : ''} ${isOverdue ? 'overdue-goal' : ''}">
          <div class="goal-top">
            <div class="goal-cat-icon" style="background:${cat.color}20;color:${cat.color}">${cat.emoji}</div>
            <div class="goal-main">
              <div class="goal-title-text">${goal.title}</div>
              <div class="goal-meta">
                <span style="color:${cat.color}">${cat.label}</span>
                <span>•</span>
                <span>${goal.current || 0} / ${goal.target} ${goal.unit || ''}</span>
                <span>•</span>
                <span style="color:${isOverdue?'var(--danger)':daysLeft<=2?'var(--warning)':'var(--text-muted)'}">
                  ${goal.completed ? '✅ Done' : isOverdue ? '⚠️ Overdue' : `${daysLeft}d left`}
                </span>
              </div>
            </div>
            <div class="goal-actions">
              <span class="goal-xp-badge">+${goal.xpReward || 100} XP</span>
              ${!goal.completed ? `<button class="btn btn-sm btn-ghost" onclick="incrementGoal('${goal.id}')">+1</button>` : ''}
              <button class="btn btn-sm btn-danger" onclick="deleteGoal('${goal.id}')">🗑</button>
            </div>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar ${goal.completed ? 'progress-success' : 'progress-primary'}" style="width:${pct}%"></div>
          </div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;text-align:right">${pct}% complete</div>
        </div>`;
      }).join('');
    }

    function renderTemplates() {
      const container = document.getElementById('goals-container');
      container.innerHTML = `<div class="grid grid-2">${TEMPLATES.map((t, i) => {
        const cat = CATEGORIES[t.category] || CATEGORIES.study;
        return `<div class="template-card" onclick="useTemplate(${i})">
          <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem">
            <span style="font-size:1.5rem">${cat.emoji}</span>
            <div>
              <div style="font-weight:600;font-size:0.9rem">${t.title}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">Target: ${t.target} ${t.unit} • ${t.days} days</div>
            </div>
          </div>
          <button class="btn btn-primary btn-sm btn-full">Use Template</button>
        </div>`;
      }).join('')}</div>`;
    }

    function useTemplate(idx) {
      const t = TEMPLATES[idx];
      const cat = CATEGORIES[t.category];
      const goal = {
        id: 'goal_' + Date.now(),
        title: t.title,
        category: t.category,
        target: t.target,
        current: 0,
        unit: t.unit,
        deadline: getDeadline(t.days),
        completed: false,
        createdAt: new Date().toISOString(),
        xpReward: Math.round(100 * (1 + t.target/50))
      };
      goals.unshift(goal);
      saveGoals();
      showToast(`🎯 Goal created: "${t.title}"`, 'success');
      switchTabFn('active');
    }

    function createGoal() {
      const title = document.getElementById('goal-title').value.trim();
      const target = parseInt(document.getElementById('goal-target').value);
      const category = document.getElementById('goal-category').value;
      const unit = document.getElementById('goal-unit').value.trim();
      const deadline = document.getElementById('goal-deadline').value;

      if (!title || !target) { showToast('Please fill in title and target', 'error'); return; }

      const goal = {
        id: 'goal_' + Date.now(),
        title,
        category,
        target,
        current: 0,
        unit,
        deadline: deadline || getDeadline(7),
        completed: false,
        createdAt: new Date().toISOString(),
        xpReward: Math.round(100 * (1 + target/50))
      };

      goals.unshift(goal);
      saveGoals();
      hideCreateModal();
      showToast('🎯 Goal created! Good luck!', 'success');
      renderStats();
      renderGoals();
    }

    window.incrementGoal = function(id) {
      const goal = goals.find(g => g.id === id);
      if (!goal || goal.completed) return;
      goal.current = (goal.current || 0) + 1;
      if (goal.current >= goal.target) {
        goal.completed = true;
        goal.completedAt = new Date().toISOString();
        const p = JSON.parse(localStorage.getItem('lvlbase_user_profile') || '{}');
        p.totalXP = (p.totalXP || 0) + (goal.xpReward || 100);
        p.goalsCompleted = (p.goalsCompleted || 0) + 1;
        localStorage.setItem('lvlbase_user_profile', JSON.stringify(p));
        showToast(`🎉 Goal completed! +${goal.xpReward || 100} XP!`, 'success', 4000);
      }
      saveGoals();
      renderStats();
      renderGoals();
    };

    window.deleteGoal = function(id) {
      if (!confirm('Delete this goal?')) return;
      goals = goals.filter(g => g.id !== id);
      saveGoals();
      renderStats();
      renderGoals();
      showToast('Goal removed', 'info');
    };

    function saveGoals() {
      localStorage.setItem('lvlbase_goals', JSON.stringify(goals));
    }

    function showCreateModal() {
      document.getElementById('create-modal').classList.add('active');
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 7);
      document.getElementById('goal-deadline').value = tomorrow.toISOString().split('T')[0];
    }

    function hideCreateModal() {
      document.getElementById('create-modal').classList.remove('active');
      document.getElementById('goal-title').value = '';
      document.getElementById('goal-target').value = '';
      document.getElementById('goal-unit').value = '';
    }

    function switchTab(tab, btn) { switchTabFn(tab); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    function switchTabFn(tab) { currentTab = tab; renderGoals(); }

    function showToast(msg, type) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${{success:'✅',error:'❌',info:'ℹ️'}[type]||'ℹ️'}</span><span>${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('toast-hide'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobile-menu')?.classList.toggle('open');
    });

    renderStats();
    renderGoals();
  </script>
</body>
</html>

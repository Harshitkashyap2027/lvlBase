<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – lvlBase ⚡</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; background: radial-gradient(ellipse at 30% 50%, rgba(108,99,255,0.15) 0%, transparent 60%), radial-gradient(ellipse at 70% 20%, rgba(255,107,107,0.1) 0%, transparent 60%), var(--dark-bg); }
    .login-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 2.5rem; width: 100%; max-width: 480px; }
    .login-brand { text-align: center; font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
    .step-indicators { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-color); transition: var(--transition); }
    .step-dot.active { background: var(--primary); width: 24px; border-radius: 4px; }
    .step-dot.done { background: var(--success); }
    .google-btn { width: 100%; padding: 0.85rem; background: rgba(255,255,255,0.08); border: 1px solid var(--border-color); border-radius: var(--radius); color: var(--text-light); font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.75rem; transition: var(--transition); font-family: var(--font); margin-bottom: 1rem; }
    .google-btn:hover { background: rgba(255,255,255,0.12); border-color: var(--primary); }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; color: var(--text-muted); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
    .guild-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .guild-select-item { border-radius: var(--radius); padding: 1rem; cursor: pointer; border: 2px solid transparent; transition: var(--transition); color: white; text-align: center; }
    .guild-select-item:hover { transform: translateY(-2px); }
    .guild-select-item.selected { border-color: white; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
    .guild-select-item .gi-emoji { font-size: 1.8rem; }
    .guild-select-item .gi-name { font-weight: 700; font-size: 0.9rem; margin-top: 0.3rem; }
    .guild-select-item .gi-bonus { font-size: 0.7rem; opacity: 0.8; margin-top: 0.2rem; }
    .grade-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .grade-btn { padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: var(--radius); text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: var(--transition); color: var(--text-light); }
    .grade-btn:hover { border-color: var(--primary); }
    .grade-btn.selected { background: rgba(108,99,255,0.2); border-color: var(--primary); color: var(--primary); }
    .error-text { color: var(--danger); font-size: 0.8rem; margin-top: 0.3rem; display: none; }
    .success-check { font-size: 3rem; text-align: center; margin-bottom: 1rem; animation: bounce 1s ease; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card animate-fadeIn">
      <div class="login-brand">lvlBase ⚡</div>
      <p style="text-align:center;color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem">Your epic learning journey awaits</p>

      <!-- Login Form -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="you@example.com" onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()">
        <div id="login-error" style="color:var(--danger);font-size:0.8rem;margin-top:0.3rem;display:none"></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="handleLogin()" id="login-btn">
        <span id="login-text">⚡ Login</span>
        <span id="login-spinner" style="display:none" class="spinner spinner-sm"></span>
      </button>

      <div style="text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--text-muted)">
        Don't have an account?
        <a href="signup.html" style="color:var(--primary);font-weight:600"> Sign Up here</a>
      </div>
      <div style="text-align:center;margin-top:0.5rem;font-size:0.82rem;color:var(--text-muted)">
        Are you a school?
        <a href="school-signup.html" style="color:var(--success);font-weight:600"> Register School →</a>
      </div>

      <!-- Role hints -->
      <div style="margin-top:1.5rem;background:rgba(255,255,255,0.03);border:1px solid var(--border-color);border-radius:16px;padding:1rem">
        <p style="font-size:0.78rem;color:var(--text-muted);font-weight:600;margin-bottom:0.5rem">🔐 Login by role:</p>
        <div style="font-size:0.75rem;color:var(--text-muted);line-height:1.9">
          🎓 <strong style="color:var(--text-light)">Students / Teachers / Parents:</strong> Use your registered email<br>
          🏫 <strong style="color:var(--text-light)">School Admin:</strong> Use your school admin email<br>
          ⚙️ <strong style="color:var(--text-light)">Platform Admin:</strong> admin@lvlbase.com
        </div>
      </div>

      <div style="text-align:center;margin-top:1.25rem">
        <a href="index.html" style="color:var(--text-muted);font-size:0.82rem">← Back to Home</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase-bridge.js"></script>
  <script src="js/popup.js"></script>
  <script>
    // Redirect if already logged in
    (function() {
      const u = JSON.parse(localStorage.getItem('lvlbase_current_user') || 'null');
      if (u) {
        const map = { student: 'dashboard.html', teacher: 'teacher-dashboard.html', parent: 'parent-dashboard.html', school_admin: 'school-dashboard.html', admin: 'admin/index.html' };
        window.location.href = map[u.role] || 'dashboard.html';
      }
    })();

    function getDashboardUrl(role) {
      const map = { student: 'dashboard.html', teacher: 'teacher-dashboard.html', parent: 'parent-dashboard.html', school_admin: 'school-dashboard.html', admin: 'admin/index.html' };
      return map[role] || 'dashboard.html';
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { lvlPopup.toast('Please fill in all fields', 'error'); return; }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      document.getElementById('login-text').style.display = 'none';
      document.getElementById('login-spinner').style.display = 'inline-block';
      document.getElementById('login-error').style.display = 'none';

      try {
        const profile = await loginUser(email, password);
        lvlPopup.toast('Welcome back, ' + profile.displayName + '! 🎮', 'success');
        setTimeout(() => window.location.href = getDashboardUrl(profile.role), 700);
      } catch(e) {
        document.getElementById('login-error').textContent = e.message;
        document.getElementById('login-error').style.display = 'block';
        btn.disabled = false;
        document.getElementById('login-text').style.display = 'inline';
        document.getElementById('login-spinner').style.display = 'none';
      }
    }

    async function loginUser(email, password) {
      const lower = email.toLowerCase().trim();
      // Super admin
      if (lower === 'admin@lvlbase.com' && password === 'admin123') {
        const p = { uid: 'admin_super', email: lower, displayName: 'Platform Admin', role: 'admin', status: 'approved', schoolId: null };
        localStorage.setItem('lvlbase_current_user', JSON.stringify(p));
        localStorage.setItem('lvlbase_user_profile', JSON.stringify(p));
        return p;
      }

      // Try Firebase Auth when available
      if (window.fb && window.fb.live) {
        try {
          const cred = await window.fb.signIn(lower, password);
          const uid = cred.user.uid;

          // Check if this is a school admin in Firestore
          const schoolData = await window.fb.getSchoolByAdminEmail(lower);
          if (schoolData) {
            const p = {
              uid,
              email: lower,
              displayName: schoolData.adminName || schoolData.principal,
              role: 'school_admin',
              status: schoolData.status === 'verified' ? 'approved' : 'pending',
              schoolId: schoolData.id,
              schoolStatus: schoolData.status
            };
            localStorage.setItem('lvlbase_current_user', JSON.stringify(p));
            localStorage.setItem('lvlbase_user_profile', JSON.stringify(p));
            return p;
          }

          // Regular user — fetch profile from Firestore
          let userData = await window.fb.getUser(uid);
          if (!userData) {
            // Try matching by email in local storage
            const users = JSON.parse(localStorage.getItem('lvlbase_all_users') || '[]');
            userData = users.find(u => u.email && u.email.toLowerCase() === lower) || null;
          }
          if (userData) {
            userData.lastLogin = new Date().toISOString();
            localStorage.setItem('lvlbase_current_user', JSON.stringify(userData));
            localStorage.setItem('lvlbase_user_profile', JSON.stringify(userData));
            return userData;
          }

          // Firebase Auth succeeded but no profile found — create minimal profile
          const p = { uid, email: lower, displayName: lower.split('@')[0], role: 'student', status: 'active' };
          localStorage.setItem('lvlbase_current_user', JSON.stringify(p));
          localStorage.setItem('lvlbase_user_profile', JSON.stringify(p));
          return p;
        } catch (fbErr) {
          // Firebase auth failed — fall through to localStorage check
          if (fbErr.code && fbErr.code !== 'auth/user-not-found' && fbErr.code !== 'auth/wrong-password' && fbErr.code !== 'auth/invalid-credential') {
            throw new Error(fbErr.message || 'Login failed');
          }
        }
      }

      // Fallback: localStorage-based login (school admin login requires Firebase Auth)
      // School admin — only email match, since passwords are NOT stored in localStorage
      const schools = JSON.parse(localStorage.getItem('lvlbase_schools') || '[]');
      const school = schools.find(s => s.adminEmail && s.adminEmail.toLowerCase() === lower);
      if (school) {
        // Without Firebase Auth, we cannot verify the password — reject with a helpful message
        throw new Error('School admin login requires an internet connection to verify your identity. Please check your connection and try again.');
      }
      // Regular users
      const users = JSON.parse(localStorage.getItem('lvlbase_all_users') || '[]');
      const user = users.find(u => u.email && u.email.toLowerCase() === lower);
      if (!user) throw new Error('No account found with this email. Please sign up first.');
      user.lastLogin = new Date().toISOString();
      const idx = users.findIndex(u => u.uid === user.uid);
      if (idx !== -1) { users[idx] = user; localStorage.setItem('lvlbase_all_users', JSON.stringify(users)); }
      localStorage.setItem('lvlbase_current_user', JSON.stringify(user));
      localStorage.setItem('lvlbase_user_profile', JSON.stringify(user));
      return user;
    }
  </script>
</body>
</html>

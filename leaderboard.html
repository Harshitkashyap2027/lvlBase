<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard – lvlBase ⚡</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .lb-full-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1rem; border-radius: var(--radius); transition: var(--transition); border: 1px solid transparent; }
    .lb-full-item:hover { background: rgba(108,99,255,0.06); border-color: var(--border-color); }
    .lb-full-item.current-user-row { background: rgba(108,99,255,0.1); border-color: var(--primary); }
    .lb-position { font-size: 1.1rem; font-weight: 800; min-width: 40px; text-align: center; }
    .lb-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
    .lb-info { flex: 1; }
    .lb-full-name { font-weight: 600; font-size: 0.95rem; }
    .lb-rank-badge { margin-left: auto; }
    .lb-streak { font-size: 0.85rem; min-width: 50px; }
    .lb-xp { min-width: 80px; text-align: right; }
    .lb-separator { height: 1px; background: var(--border-color); margin: 0.25rem 0; }
    .search-box { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
    .search-input { flex: 1; }
    .user-rank-card { background: linear-gradient(135deg, rgba(108,99,255,0.2), var(--card-bg)); border: 1px solid var(--primary); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">lvlBase ⚡</a>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="quiz.html" class="nav-link">Quiz</a>
      <a href="battles.html" class="nav-link">Battle</a>
      <a href="leaderboard.html" class="nav-link active">Leaderboard</a>
    </div>
    <div class="navbar-actions">
      <span id="nav-xp" style="color:var(--accent);font-weight:700;font-size:0.9rem"></span>
      <a href="dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <div class="page-wrapper">
    <div style="max-width:900px;margin:0 auto;padding:2rem 1.5rem">
      <div class="page-header">
        <h1 class="page-title">🏆 Leaderboard</h1>
        <p class="page-subtitle">See where you stand among the best</p>
      </div>

      <!-- User's current rank -->
      <div class="user-rank-card" id="user-rank-card" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
          <div style="display:flex;align-items:center;gap:1rem">
            <div class="avatar avatar-lg" id="my-avatar">??</div>
            <div>
              <div style="font-weight:700;font-size:1.1rem" id="my-name">Player</div>
              <div id="my-rank-badge"></div>
            </div>
          </div>
          <div style="display:flex;gap:2rem;text-align:center;flex-wrap:wrap">
            <div><div style="font-size:1.5rem;font-weight:800;color:var(--primary)" id="my-xp">0</div><div style="font-size:0.75rem;color:var(--text-muted)">XP</div></div>
            <div><div style="font-size:1.5rem;font-weight:800;color:var(--accent)" id="my-position">#-</div><div style="font-size:0.75rem;color:var(--text-muted)">Rank Position</div></div>
            <div><div style="font-size:1.5rem;font-weight:800;color:var(--success)" id="my-streak">0</div><div style="font-size:0.75rem;color:var(--text-muted)">Day Streak</div></div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs mb-3">
        <button class="tab-btn active" onclick="switchTab('individual',this)">👤 Individual</button>
        <button class="tab-btn" onclick="switchTab('guild',this)">🏰 Guild</button>
        <button class="tab-btn" onclick="switchTab('national',this)">🌏 National</button>
      </div>

      <!-- Search -->
      <div class="search-box">
        <input type="text" class="form-control search-input" id="search-input" placeholder="🔍 Search players..." oninput="filterBoard()">
        <button class="btn btn-ghost btn-sm" onclick="clearSearch()">Clear</button>
      </div>

      <!-- Board -->
      <div class="card" id="board-container" style="padding:1.5rem">
        <div id="board-list"></div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    const GUILDS = { shadow:{name:'Shadow Guild',emoji:'🌙',gradient:'linear-gradient(135deg,#4C1D95,#7C3AED)'}, azure:{name:'Azure Order',emoji:'💧',gradient:'linear-gradient(135deg,#1E3A8A,#2563EB)'}, inferno:{name:'Inferno Legion',emoji:'🔥',gradient:'linear-gradient(135deg,#7F1D1D,#DC2626)'}, titan:{name:'Titan Brotherhood',emoji:'⚡',gradient:'linear-gradient(135deg,#14532D,#16A34A)'}, zenith:{name:'Zenith Circle',emoji:'✨',gradient:'linear-gradient(135deg,#78350F,#D97706)'} };

    const profile = JSON.parse(localStorage.getItem('lvlbase_user_profile') || 'null');
    if (profile?.totalXP) document.getElementById('nav-xp').textContent = `⚡ ${profile.totalXP} XP`;

    const DEMO_INDIVIDUAL = [
      { name:'Arjun Sharma', xp:28500, rankId:'SS', guild:'shadow', avatar:'AS', streak:45 },
      { name:'Priya Patel', xp:24200, rankId:'S', guild:'azure', avatar:'PP', streak:32 },
      { name:'Rohan Mehta', xp:21800, rankId:'S', guild:'inferno', avatar:'RM', streak:28 },
      { name:'Anika Singh', xp:19500, rankId:'S', guild:'titan', avatar:'AS', streak:21 },
      { name:'Dev Kapoor', xp:17300, rankId:'A', guild:'zenith', avatar:'DK', streak:18 },
      { name:'Sneha Iyer', xp:15100, rankId:'A', guild:'shadow', avatar:'SI', streak:15 },
      { name:'Karan Malhotra', xp:13400, rankId:'A', guild:'azure', avatar:'KM', streak:12 },
      { name:'Ritika Gupta', xp:11200, rankId:'B', guild:'inferno', avatar:'RG', streak:9 },
      { name:'Vikram Rao', xp:9800, rankId:'B', guild:'titan', avatar:'VR', streak:7 },
      { name:'Meera Nair', xp:8600, rankId:'B', guild:'zenith', avatar:'MN', streak:6 }
    ];

    function getIndividualBoard() {
      const board = [...DEMO_INDIVIDUAL];
      if (profile && profile.totalXP > 0) {
        const exists = board.find(u => u.name === profile.displayName);
        if (!exists) board.push({ name: profile.displayName || 'You', xp: profile.totalXP, rankId: getRankId(profile.totalXP), guild: profile.guild || 'none', avatar: (profile.displayName||'P').substring(0,2).toUpperCase(), streak: profile.streak || 0, isCurrentUser: true });
      }
      return board.sort((a,b) => b.xp - a.xp).map((u,i) => ({ ...u, rank: i+1 }));
    }

    function getRankId(xp) {
      if (xp >= 30000) return 'SS';
      if (xp >= 15000) return 'S';
      if (xp >= 7000) return 'A';
      if (xp >= 3500) return 'B';
      if (xp >= 1500) return 'C';
      if (xp >= 500) return 'D';
      return 'E';
    }

    function fmt(n) { if (n >= 1000) return (n/1000).toFixed(1)+'K'; return n; }

    let currentTab = 'individual';
    let allData = [];

    function renderIndividual() {
      const board = getIndividualBoard();
      allData = board;

      // Show user rank card
      if (profile) {
        const myPos = board.find(u => u.isCurrentUser);
        document.getElementById('user-rank-card').style.display = 'block';
        document.getElementById('my-avatar').textContent = (profile.displayName||'P').substring(0,2).toUpperCase();
        document.getElementById('my-name').textContent = profile.displayName || 'Player';
        document.getElementById('my-rank-badge').innerHTML = `<span class="rank-badge rank-${getRankId(profile.totalXP).toLowerCase()}">${getRankId(profile.totalXP)}-Rank</span>`;
        document.getElementById('my-xp').textContent = fmt(profile.totalXP || 0);
        document.getElementById('my-position').textContent = myPos ? '#' + myPos.rank : '#–';
        document.getElementById('my-streak').textContent = profile.streak || 0;
      }

      renderBoard(board);
    }

    function renderBoard(data) {
      const list = document.getElementById('board-list');
      if (data.length === 0) { list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem">No results found</div>'; return; }
      list.innerHTML = data.map((item, i) => {
        const colors = ['#FFD700','#C0C0C0','#CD7F32'];
        const emojis = ['🥇','🥈','🥉'];
        const isTop3 = i < 3;
        const guildData = GUILDS[item.guild] || {};
        return `
          <div class="lb-full-item ${item.isCurrentUser ? 'current-user-row' : ''}">
            <div class="lb-position" style="color:${isTop3?colors[i]:'var(--text-muted)'}">${isTop3?emojis[i]:'#'+item.rank}</div>
            <div class="lb-avatar" style="background:${guildData.gradient||'linear-gradient(135deg,var(--primary),var(--secondary))'}">
              ${item.avatar || item.name?.substring(0,2).toUpperCase()}
            </div>
            <div class="lb-info">
              <div class="lb-full-name">${item.name} ${item.isCurrentUser ? '<span class="badge badge-primary" style="font-size:0.65rem">You</span>' : ''}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">${guildData.emoji||''} ${guildData.name||'No Guild'}</div>
            </div>
            <span class="rank-badge rank-${(item.rankId||'e').toLowerCase()}">${item.rankId||'E'}-Rank</span>
            <div class="lb-streak">🔥 ${item.streak||0}</div>
            <div class="lb-xp" style="color:var(--primary);font-weight:700">⚡ ${fmt(item.xp)}</div>
          </div>
          ${i < data.length-1 ? '<div class="lb-separator"></div>' : ''}`;
      }).join('');
    }

    function renderGuildBoard() {
      allData = [
        { rank:1, name:'Shadow Guild', emoji:'🌙', guild:'shadow', members:234, avgXP:12500, totalXP:2925000, wins:89 },
        { rank:2, name:'Inferno Legion', emoji:'🔥', guild:'inferno', members:198, avgXP:11800, totalXP:2336400, wins:76 },
        { rank:3, name:'Azure Order', emoji:'💧', guild:'azure', members:215, avgXP:10900, totalXP:2343500, wins:71 },
        { rank:4, name:'Titan Brotherhood', emoji:'⚡', guild:'titan', members:178, avgXP:9800, totalXP:1744400, wins:63 },
        { rank:5, name:'Zenith Circle', emoji:'✨', guild:'zenith', members:156, avgXP:8900, totalXP:1388400, wins:55 }
      ];
      const list = document.getElementById('board-list');
      const colors = ['#FFD700','#C0C0C0','#CD7F32'];
      const emojis = ['🥇','🥈','🥉'];
      list.innerHTML = allData.map((item, i) => {
        const guildData = GUILDS[item.guild] || {};
        const isCurrentGuild = profile?.guild === item.guild;
        return `
          <div class="lb-full-item ${isCurrentGuild ? 'current-user-row' : ''}">
            <div class="lb-position" style="color:${i<3?colors[i]:'var(--text-muted)'}">${i<3?emojis[i]:'#'+item.rank}</div>
            <div class="lb-avatar" style="background:${guildData.gradient||'var(--primary)'}; font-size:1.3rem">${item.emoji}</div>
            <div class="lb-info">
              <div class="lb-full-name">${item.name} ${isCurrentGuild?'<span class="badge badge-primary" style="font-size:0.65rem">Your Guild</span>':''}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">${item.members} members</div>
            </div>
            <div style="font-size:0.85rem;color:var(--success)">⚔️ ${item.wins} wins</div>
            <div style="font-size:0.85rem;color:var(--text-muted)">Avg ⚡${fmt(item.avgXP)}</div>
            <div class="lb-xp" style="color:var(--primary);font-weight:700">⚡ ${fmt(item.totalXP)}</div>
          </div>
          ${i < allData.length-1 ? '<div class="lb-separator"></div>' : ''}`;
      }).join('');
    }

    function renderNationalBoard() {
      allData = [
        { rank:1, name:'Arjun Sharma', school:'DPS Delhi', xp:48500, subject:'Math', rankId:'SS' },
        { rank:2, name:'Priya Patel', school:'Ryan International', xp:45200, subject:'Science', rankId:'SS' },
        { rank:3, name:'Rohan Mehta', school:'Kendriya Vidyalaya', xp:41800, subject:'English', rankId:'SS' },
        { rank:4, name:'Sneha Iyer', school:'CBSE Chennai', xp:38900, subject:'Math', rankId:'S' },
        { rank:5, name:'Karan Malhotra', school:"St. Xavier's", xp:36400, subject:'Science', rankId:'S' },
        { rank:6, name:'Anika Singh', school:'DPS Noida', xp:34100, subject:'English', rankId:'S' },
        { rank:7, name:'Dev Kapoor', school:'Modern School', xp:31700, subject:'Math', rankId:'S' },
        { rank:8, name:'Meera Nair', school:'Amity Pune', xp:29500, subject:'Science', rankId:'A' },
        { rank:9, name:'Vikram Rao', school:'MIT Hyderabad', xp:27200, subject:'Math', rankId:'A' },
        { rank:10, name:'Ritika Gupta', school:'DPS Bangalore', xp:25800, subject:'English', rankId:'A' }
      ];
      const list = document.getElementById('board-list');
      const colors = ['#FFD700','#C0C0C0','#CD7F32'];
      const emojis = ['🥇','🥈','🥉'];
      list.innerHTML = allData.map((item, i) => `
        <div class="lb-full-item">
          <div class="lb-position" style="color:${i<3?colors[i]:'var(--text-muted)'}">${i<3?emojis[i]:'#'+item.rank}</div>
          <div class="lb-avatar" style="background:linear-gradient(135deg,var(--primary),var(--secondary))">${item.name.substring(0,2)}</div>
          <div class="lb-info">
            <div class="lb-full-name">${item.name}</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">🏫 ${item.school} • 📚 ${item.subject}</div>
          </div>
          <span class="rank-badge rank-${item.rankId.toLowerCase()}">${item.rankId}-Rank</span>
          <div class="lb-xp" style="color:var(--primary);font-weight:700">⚡ ${fmt(item.xp)}</div>
        </div>
        ${i < allData.length-1 ? '<div class="lb-separator"></div>' : ''}`).join('');
    }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('search-input').value = '';
      document.getElementById('user-rank-card').style.display = 'none';
      if (tab === 'individual') renderIndividual();
      else if (tab === 'guild') renderGuildBoard();
      else renderNationalBoard();
    }

    function filterBoard() {
      const query = document.getElementById('search-input').value.toLowerCase();
      if (!query) { if (currentTab === 'individual') renderIndividual(); return; }
      const filtered = allData.filter(u => (u.name||u.school||'').toLowerCase().includes(query));
      renderBoard(filtered);
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      if (currentTab === 'individual') renderIndividual();
      else if (currentTab === 'guild') renderGuildBoard();
      else renderNationalBoard();
    }

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobile-menu')?.classList.toggle('open');
    });

    renderIndividual();
  </script>
</body>
</html>
